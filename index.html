<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Логика монтажа — HATE YOUR PROD</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="site-shell">
    <div class="design-wrap" id="designWrap">
      <img src="assets/design.jpeg" alt="HATE YOUR PROD — Логика монтажа" class="design">

      <button class="hotspot hs-cta" data-section="intro" aria-label="Я монтирую — ты смотришь"></button>

      <button class="hotspot hs-intro" data-section="intro" aria-label="Интро"></button>
      <button class="hotspot hs-theory" data-section="theory" aria-label="Теория"></button>
      <button class="hotspot hs-editing" data-section="editing" aria-label="Монтаж"></button>
      <button class="hotspot hs-materials" data-section="materials" aria-label="Материалы к курсу"></button>
      <button class="hotspot hs-extra" data-section="extra" aria-label="Дополнительные материалы"></button>

      <button class="hotspot nav-home" data-scroll="top" aria-label="Главная"></button>
      <button class="hotspot nav-sections" data-scroll="sections" aria-label="Разделы"></button>
      <button class="hotspot nav-materials" data-section="materials" aria-label="Материалы"></button>
      <button class="hotspot nav-info" data-section="info" aria-label="Информация"></button>
    </div>
  </main>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal-card">
      <button class="close" id="close">×</button>
      <div class="kicker" id="kicker">РАЗДЕЛ</div>
      <h2 id="title">Название</h2>
      <p id="text"></p>
      <div id="items"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
